<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="shared/styles.css">
<style>
  .body-map-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    height: 100%;
    justify-content: center;
  }

  .title-text {
    font-size: 48px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #fff;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: var(--radius-sm);
    padding: 4px;
  }

  .view-btn {
    padding: 12px 28px;
    border-radius: var(--radius-sm);
    font-size: 22px;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    border: none;
    background: transparent;
  }

  .view-btn.active {
    background: var(--orange);
    color: #fff;
  }

  .body-svg-wrapper {
    width: 500px;
    height: 900px;
    position: relative;
  }

  .body-svg {
    width: 100%;
    height: 100%;
  }

  .body-outline {
    fill: rgba(128,128,128,0.1);
    stroke: rgba(128,128,128,0.5);
    stroke-width: 1;
  }

  .muscle-path {
    stroke: none;
    transition: fill 0.3s ease;
  }

  .muscle-inactive {
    fill: rgba(128,128,128,0.3);
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    color: var(--gray);
  }

  .legend-dot {
    width: 16px;
    height: 16px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="template-container">
  <div class="body-map-container">
    <div class="title-text" id="title">Muscle Balance</div>

    <div class="view-toggle">
      <div class="view-btn active" id="btnFront">Front</div>
      <div class="view-btn" id="btnBack">Back</div>
    </div>

    <div class="body-svg-wrapper">
      <svg id="bodySvg" class="body-svg" viewBox="0 0 248.333 557.994" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="legend" id="legend"></div>
  </div>

  <div class="watermark"><img src="shared/prpath-logo.png" alt=""><span>PRPath</span></div>
</div>

  } catch(e) {}

  // Support muscle_NAME=score format (auto-maps score to tier color)
  for (const [key, val] of params.entries()) {
    if (key.startsWith('muscle_') && !key.endsWith('_color') && !key.endsWith('_intensity')) {
      const muscleName = key.replace('muscle_', '');
      const score = parseInt(val);
      if (!isNaN(score)) {
        const tier = getTierFromScore(score);
        muscleData[muscleName] = { active: true, color: TIER_COLORS[tier], intensity: 0.7, score: score };
      }
    }
  }

  // Support NAME_color + NAME_intensity format (direct color control)
  // e.g. chest_color=%23FF3B30&chest_intensity=0.8
  var ALIAS_MAP = {
    chest: 'pectoralis', shoulders: 'deltoid', core: 'abdominals', abs: 'abdominals',
    quads: 'quadriceps', calves: 'gastrocnemius', traps: 'trapezius',
    upper_back: 'infraspinatus_teres_major', mid_traps: 'trapezius_lower',
    lats: 'latissimus_dorsi', glutes: 'gluteus_maximus', glute_med: 'gluteus_medius2'
  };
  for (const [key, val] of params.entries()) {
    if (key.endsWith('_color')) {
      var base = key.replace('_color', '');
      var muscleId = ALIAS_MAP[base] || base;
      var intensity = parseFloat(params.get(base + '_intensity') || '0.7');
      var color = val.startsWith('#') ? val : '#' + val;
      muscleData[muscleId] = { active: true, color: color, intensity: intensity };
    }
  }

  const paths = view === 'back' ? BACK_PATHS : FRONT_PATHS;
  const muscleList = view === 'back' ? BACK_MUSCLES : FRONT_MUSCLES;

  if (view === 'back') {
    document.getElementById('btnBack').classList.add('active');
    document.getElementById('btnFront').classList.remove('active');
  }

  renderBody(paths, muscleList, muscleData);
}

function renderBody(paths, muscleList, muscleData) {
  const svg = document.getElementById('bodySvg');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  outline.setAttribute('d', paths.bodyOutline);
  outline.setAttribute('class', 'body-outline');
  svg.appendChild(outline);

  muscleList.forEach(function(id) {
    var pathData = paths[id];
    if (!pathData) return;

    var el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', pathData);
    el.setAttribute('class', 'muscle-path');

    var data = muscleData[id];
    if (data && data.active) {
      var intensity = data.intensity || 0.7;
      var hex = Math.round(intensity * 255).toString(16);
      if (hex.length < 2) hex = '0' + hex;
      el.style.fill = data.color + hex;
    } else {
      el.classList.add('muscle-inactive');
    }

    svg.appendChild(el);
  });

  var legendEl = document.getElementById('legend');
  while (legendEl.firstChild) legendEl.removeChild(legendEl.firstChild);

  var tiers = [
    { name: 'Beginner', color: TIER_COLORS.beginner },
    { name: 'Novice', color: TIER_COLORS.novice },
    { name: 'Intermediate', color: TIER_COLORS.intermediate },
    { name: 'Advanced', color: TIER_COLORS.advanced },
    { name: 'Elite', color: TIER_COLORS.elite },
    { name: 'World Class', color: TIER_COLORS.worldclass }
  ];

  tiers.forEach(function(t) {
    var item = document.createElement('div');
    item.className = 'legend-item';

    var dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = t.color;
    item.appendChild(dot);

    var text = document.createTextNode(t.name);
    item.appendChild(text);

    legendEl.appendChild(item);
  });
}

init();
</script>
</body>
</html>
