<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>PRPath Hook Slide</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  /* hook_photo_slide.html — stop-the-scroll cover with dramatic text.
     URL params:
       ?pre=Do%20you%20even                 line 1 (small, top)
       &accent=TRAIN%20LEGS?                giant center text (required)
       &post=Your%20recovery%20map%20says%20no.   line 3 (medium, bottom)
       &mood=fire|cool|warning|default      background gradient mood
       &photo=path/to/pexels.jpg            optional background photo (filter darkens it)
       &tag=PRPATH                          optional corner tag
  */
  body { overflow: hidden; }

  .slide {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 90px;
    text-align: center;
    background: var(--bg-dark);
  }

  /* Background moods (radial vignette + subtle tint) */
  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg.default {
    background:
      radial-gradient(circle at 30% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 60%),
      radial-gradient(circle at 80% 90%, rgba(255, 59, 0, 0.12) 0%, transparent 60%),
      #0F0F11;
  }
  .bg.fire {
    background:
      radial-gradient(circle at 50% 65%, rgba(255, 59, 0, 0.55) 0%, transparent 55%),
      radial-gradient(circle at 20% 20%, rgba(255, 107, 53, 0.25) 0%, transparent 60%),
      #140805;
  }
  .bg.cool {
    background:
      radial-gradient(circle at 60% 50%, rgba(0, 176, 255, 0.18) 0%, transparent 60%),
      #0A1419;
  }
  .bg.warning {
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 149, 0, 0.25) 0%, transparent 60%),
      #161109;
  }

  /* Photo underlay — filter darkens it so text always reads */
  .bg-photo {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.35) saturate(0.9);
    z-index: 0;
  }
  .bg-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .pre {
    font-size: 48px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: -0.5px;
  }

  .accent {
    font-family: var(--font);
    font-weight: 900;
    font-size: 180px;
    line-height: 0.95;
    letter-spacing: -6px;
    color: #fff;
    text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
    max-width: 940px;
  }
  .accent.orange { color: var(--orange); }
  .accent.red { color: var(--tier-beginner); }

  .post {
    font-size: 38px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.82);
    line-height: 1.3;
    max-width: 820px;
    letter-spacing: -0.2px;
  }

  .tag {
    position: absolute;
    top: 60px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 26px;
    font-weight: 700;
    color: var(--orange);
    z-index: 2;
  }
  .tag img { width: 40px; height: 40px; }

  .swipe {
    position: absolute;
    bottom: 60px;
    right: 60px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.55);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg" id="bg"></div>

  <div class="tag">
    <img src="../shared/prpath-logo.png" alt="">
    <span>PRPath</span>
  </div>

  <div class="content">
    <div class="pre" id="pre"></div>
    <div class="accent" id="accent">TRAIN LEGS?</div>
    <div class="post" id="post"></div>
  </div>

  <div class="swipe">SWIPE →</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pre = params.get('pre') || '';
  const accent = params.get('accent');
  const post = params.get('post') || '';
  const mood = params.get('mood') || 'default';
  const photo = params.get('photo');
  const accentColor = params.get('accent_color') || 'white';

  const bg = document.getElementById('bg');
  bg.classList.add(mood);

  if (photo) {
    bg.className = 'bg-photo';
    bg.style.backgroundImage = `url('${decodeURIComponent(photo)}')`;
  }

  document.getElementById('pre').textContent = decodeURIComponent(pre);
  if (accent) document.getElementById('accent').textContent = decodeURIComponent(accent);
  document.getElementById('post').textContent = decodeURIComponent(post);

  if (accentColor !== 'white') {
    document.getElementById('accent').classList.add(accentColor);
  }
</script>
</body>
</html>
