<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="stylesheet" href="shared/styles.css">
<style>
  .phone-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 40px;
    padding: 40px 0;
  }

  /* iPhone-style frame at ~scaled iPhone 15 Pro proportions */
  .phone-frame {
    position: relative;
    width: 560px;
    height: 1140px;
    background: #0a0a0a;
    border-radius: 70px;
    padding: 18px;
    box-shadow:
      0 0 0 2px #2a2a2c,
      0 0 0 6px #1a1a1a,
      0 30px 80px rgba(0, 0, 0, 0.6);
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 52px;
    overflow: hidden;
    background: var(--bg-dark);
    position: relative;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 42px;
    background: #000;
    border-radius: 22px;
    z-index: 10;
  }

  /* Status bar (time + icons) */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 48px;
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    z-index: 9;
    font-family: var(--font);
  }

  .status-bar .icons {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 18px;
  }

  /* Home indicator (bottom bar) */
  .home-indicator {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 6px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 3px;
    z-index: 10;
  }

  /* The iframe that holds the template content */
  .phone-content {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg-dark);
  }

  /* If no iframe, show a placeholder */
  .placeholder-content {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    color: var(--gray);
    font-size: 28px;
  }

  /* CTA below phone */
  .phone-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .cta-text {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
  }

  .cta-text .accent {
    color: var(--orange);
  }

  .app-store-badge {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    color: #000;
    padding: 14px 32px;
    border-radius: 14px;
    font-size: 22px;
  }

  .app-store-badge .badge-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }

  .app-store-badge .badge-small {
    font-size: 13px;
    font-weight: 400;
  }

  .app-store-badge .badge-big {
    font-size: 24px;
    font-weight: 600;
  }

  .logo-top {
    position: absolute;
    top: 40px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
  }

  .logo-top img {
    width: 36px;
    height: 36px;
  }

  .logo-top span {
    font-family: var(--font-rounded);
    font-size: 26px;
    font-weight: 800;
    color: var(--orange);
  }
</style>
</head>
<body>
<div class="template-container">
  <div class="logo-top">
    <img src="shared/prpath-logo.png" alt="">
    <span>PRPath</span>
  </div>

  <div class="phone-layout">
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span id="statusTime">9:41</span>
          <div class="icons">
            <span>◀◀◀</span>
            <span>▂</span>
          </div>
        </div>
        <div id="screenContent" class="placeholder-content">
          Screen Preview
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>

    <div class="phone-cta">
      <div class="cta-text" id="ctaText">
        Download <span class="accent">PRPath</span> — Free
      </div>
      <div class="app-store-badge">
        <img src="shared/app-icon.png" alt="" style="width:32px;height:32px;border-radius:8px;">
        <div class="badge-text">
          <span class="badge-small">Download on the</span>
          <span class="badge-big">App Store</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function init() {
  var params = new URLSearchParams(window.location.search);
  var screenUrl = params.get('screen_url');
  var ctaTextOverride = params.get('cta_text');
  var bg = params.get('background') || '#1C1C1E';
  var statusTime = params.get('status_time') || '9:41';

  document.body.style.background = bg;
  document.querySelector('.template-container').style.background = bg;
  document.getElementById('statusTime').textContent = statusTime;

  if (ctaTextOverride) {
    var el = document.getElementById('ctaText');
    while (el.firstChild) el.removeChild(el.firstChild);
    el.textContent = ctaTextOverride;
  }

  if (screenUrl) {
    // URL-decode and load another template inside the phone screen
    var decoded = decodeURIComponent(screenUrl);
    var container = document.getElementById('screenContent');
    while (container.firstChild) container.removeChild(container.firstChild);

    var iframe = document.createElement('iframe');
    iframe.className = 'phone-content';
    iframe.src = decoded;
    iframe.setAttribute('scrolling', 'no');

    // Scale the 1080x1350 template down to fit phone screen (~524x1104)
    iframe.style.width = '1080px';
    iframe.style.height = '1350px';
    iframe.style.transform = 'scale(0.485)';
    iframe.style.transformOrigin = 'top left';
    iframe.style.position = 'absolute';
    iframe.style.top = '60px';
    iframe.style.left = '0';

    container.style.position = 'relative';
    container.style.overflow = 'hidden';
    container.appendChild(iframe);
  }
}

init();
</script>
</body>
</html>
